# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    # Base compose already binds Postgres to 127.0.0.1 only.
    # Keep production access limited to the host/app server; do not publish it publicly.
    ports:
      - "127.0.0.1:5432:5432"

  app:
    container_name: cc_portfolio_app
    ports: []  # nginx handles routing — no host port needed
    volumes:
      - /var/www/cc-portfolio/sandbox-content:/app/sandbox-content
    networks:
      - default
      - nginx_shared
    restart: unless-stopped

networks:
  nginx_shared:
    external: true
    name: nginx_shared
